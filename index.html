<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Totem — Find Your Crew</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, deleteDoc, onSnapshot, query, orderBy, updateDoc, arrayUnion, arrayRemove, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB3AKR6ZDizTdD8ApHMOd8eLlslocHiXQc",
  authDomain: "totem-a7633.firebaseapp.com",
  projectId: "totem-a7633",
  storageBucket: "totem-a7633.firebasestorage.app",
  messagingSenderId: "781169786349",
  appId: "1:781169786349:web:2f5f61c452a09268d7bbe4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
window._db = db;
window._auth = auth;
window._firebase = { collection, doc, setDoc, getDoc, getDocs, addDoc, deleteDoc, onSnapshot, query, orderBy, updateDoc, arrayUnion, arrayRemove, serverTimestamp, where };
window._firebaseAuth = { createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut };
window._dbReady = true;
window.dispatchEvent(new Event('dbReady'));
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#F6F1E9;--surface:#FFF;--surface2:#EEE8DE;--surface3:#E4DDD0;
  --border:#E0D8CC;--border2:#C8BFB0;
  --text:#1A1612;--text2:#6B6258;--text3:#A09488;
  --accent:#E8633A;--accent-d:#C8522A;--accent-l:#FDF0EB;--accent-l2:#FAE3D8;
  --green:#2A7A5E;--green-l:#ECF5F1;--green-b:#B5D9CE;
  --red:#E53E3E;--red-l:#FFF5F5;
  --r:16px;--r-sm:10px;--r-xs:6px;
  --shadow:0 2px 20px rgba(0,0,0,0.07);--shadow-lg:0 8px 40px rgba(0,0,0,0.12);
}
html,body{height:100%;background:#D0C8BC;overflow:hidden;}
body{display:flex;justify-content:center;font-family:'Outfit',sans-serif;-webkit-font-smoothing:antialiased;}
.phone{width:100%;max-width:430px;height:100vh;background:var(--bg);display:flex;flex-direction:column;position:relative;overflow:hidden;box-shadow:var(--shadow-lg);}

/* AUTH SCREEN */
.auth-screen{position:absolute;inset:0;background:var(--surface);z-index:150;display:none;flex-direction:column;overflow-y:auto;scrollbar-width:none;}
.auth-screen::-webkit-scrollbar{display:none;}
.auth-hero{background:var(--accent);padding:52px 28px 36px;position:relative;overflow:hidden;flex-shrink:0;}
.auth-hero::before{content:'';position:absolute;width:200px;height:200px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);top:-60px;right:-60px;}
.auth-logo{font-family:'Unbounded',sans-serif;font-size:38px;font-weight:900;color:white;letter-spacing:-1px;}
.auth-tagline{font-size:14px;color:rgba(255,255,255,0.8);margin-top:8px;line-height:1.5;}
.auth-body{padding:28px 24px;padding-bottom:max(60px,env(safe-area-inset-bottom,60px));display:flex;flex-direction:column;gap:14px;}
.auth-title{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:700;line-height:1.3;}
.auth-input{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:14px 16px;font-family:'Outfit',sans-serif;font-size:16px;color:var(--text);outline:none;width:100%;transition:border-color 0.2s;}
.auth-input:focus{border-color:var(--accent);}
.auth-input::placeholder{color:var(--text3);}
.auth-btn{background:var(--accent);border:none;border-radius:var(--r-sm);padding:16px;font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;color:white;cursor:pointer;width:100%;letter-spacing:0.5px;box-shadow:0 4px 16px rgba(232,99,58,0.3);transition:background 0.15s;}
.auth-btn:hover{background:#C8522A;}
.auth-btn:disabled{opacity:0.5;cursor:not-allowed;}
.auth-switch{text-align:center;font-size:13px;color:var(--text3);}
.auth-switch b{color:var(--accent);cursor:pointer;font-weight:600;}
.auth-error{background:#FFF5F5;border:1px solid #FED7D7;border-radius:var(--r-sm);padding:10px 14px;font-size:13px;color:#C53030;display:none;line-height:1.5;}
.auth-divider{display:flex;align-items:center;gap:12px;color:var(--text3);font-size:12px;}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* SPLASH */
.splash{position:absolute;inset:0;background:var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity 0.6s ease,transform 0.6s ease;}
.splash.hide{opacity:0;transform:scale(1.04);pointer-events:none;}
.splash-logo{font-family:'Unbounded',sans-serif;font-size:52px;font-weight:900;color:white;letter-spacing:-2px;}
.splash-sub{font-size:15px;color:rgba(255,255,255,0.75);margin-top:10px;}
.splash-ring{position:absolute;border-radius:50%;border:1px solid rgba(255,255,255,0.1);}

/* LOADING */
.loading{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:90;gap:14px;}
.loading-logo{font-family:'Unbounded',sans-serif;font-size:28px;font-weight:900;color:var(--accent);}
.spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ONBOARDING */
.ob{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--surface);z-index:100;overflow-y:auto;scrollbar-width:none;}
.ob::-webkit-scrollbar{display:none;}
.ob-hero{background:var(--accent);padding:48px 28px 32px;position:relative;overflow:hidden;flex-shrink:0;}
.ob-ring{position:absolute;border-radius:50%;border:1px solid rgba(255,255,255,0.1);}
.ob-logo{font-family:'Unbounded',sans-serif;font-size:36px;font-weight:900;color:white;letter-spacing:-1px;position:relative;z-index:1;}
.ob-tagline{font-size:15px;color:rgba(255,255,255,0.8);margin-top:10px;line-height:1.55;position:relative;z-index:1;}
.ob-body{padding:24px 24px;padding-bottom:max(80px, calc(env(safe-area-inset-bottom, 0px) + 80px));display:flex;flex-direction:column;gap:12px;}
.ob-step{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);}
.ob-title{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:700;line-height:1.35;}
.ob-desc{font-size:13px;color:var(--text2);line-height:1.6;}
.ob-input{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:14px 16px;font-family:'Outfit',sans-serif;font-size:15px;color:var(--text);outline:none;width:100%;transition:border-color 0.2s,box-shadow 0.2s;}
.ob-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-l2);}
.ob-input::placeholder{color:var(--text3);}
.ob-primary{background:var(--accent);border:none;border-radius:var(--r-sm);padding:16px;font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;color:white;cursor:pointer;width:100%;letter-spacing:0.5px;margin-top:8px;transition:background 0.15s,transform 0.1s;box-shadow:0 4px 16px rgba(232,99,58,0.3);}
.ob-primary:hover{background:var(--accent-d);}
.ob-primary:active{transform:scale(0.98);}
.ob-primary:disabled{opacity:0.5;cursor:not-allowed;}
.ob-ghost{background:transparent;border:1.5px solid var(--border);border-radius:var(--r-sm);padding:14px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;width:100%;transition:all 0.15s;}
.ob-ghost:hover{border-color:var(--accent);color:var(--accent);}
.ob-divider{display:flex;align-items:center;gap:12px;color:var(--text3);font-size:12px;}
.ob-divider::before,.ob-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.ob-dots{display:flex;justify-content:center;gap:6px;margin-top:4px;}
.ob-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);transition:all 0.3s;}
.ob-dot.act{background:var(--accent);width:18px;border-radius:3px;}

/* TOTEM GRID */
.totem-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.totem-opt{aspect-ratio:1;border-radius:var(--r-sm);border:2px solid var(--border);background:var(--surface2);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.totem-opt.sel{border-color:var(--accent);background:var(--accent-l);transform:scale(1.08);}
.chosen-totem{text-align:center;font-size:48px;margin:8px 0;animation:totemPop 0.3s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes totemPop{from{transform:scale(0.6);opacity:0;}to{transform:scale(1);opacity:1;}}

/* INTEREST GRID */
.int-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.int-btn{background:var(--surface2);border:2px solid transparent;border-radius:var(--r-sm);padding:12px 10px;cursor:pointer;display:flex;align-items:center;gap:7px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;color:var(--text2);transition:all 0.15s;text-align:left;}
.int-btn.on{background:var(--accent-l);border-color:var(--accent);color:var(--accent);}
.int-emoji{font-size:17px;flex-shrink:0;}
.int-check{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;margin-left:auto;transition:all 0.15s;}
.int-btn.on .int-check{background:var(--accent);border-color:var(--accent);color:white;}

/* JOIN */
.join-card{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r);padding:18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all 0.15s;}
.join-card:hover{border-color:var(--accent);background:var(--accent-l);}
.join-icon{width:52px;height:52px;background:var(--surface);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;border:1px solid var(--border);}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 18px 0;flex-shrink:0;position:sticky;top:0;z-index:50;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.logo{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:900;color:var(--accent);letter-spacing:-0.5px;}
.group-badge{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px 5px 8px;font-size:12px;font-weight:600;color:var(--text2);max-width:200px;}
.nav{display:flex;overflow-x:auto;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{background:none;border:none;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;color:var(--text3);padding:8px 13px 10px;cursor:pointer;position:relative;white-space:nowrap;transition:color 0.15s;}
.nav-btn.act{color:var(--accent);}
.nav-btn.act::after{content:'';position:absolute;bottom:0;left:10px;right:10px;height:2.5px;background:var(--accent);border-radius:2px 2px 0 0;}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:20px 20px 80px;scrollbar-width:none;}
.content::-webkit-scrollbar{display:none;}

/* SHARED */
.sec-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;}
.sec-title{font-family:'Unbounded',sans-serif;font-size:17px;font-weight:700;letter-spacing:-0.3px;}
.sec-sub{font-size:12px;color:var(--text3);}
.lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-top:18px;margin-bottom:8px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:10px;transition:border-color 0.15s,box-shadow 0.15s;animation:fadeUp 0.2s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.card.click{cursor:pointer;}
.card.click:hover{border-color:var(--border2);box-shadow:var(--shadow);}
.card.click:active{transform:scale(0.99);}
.info-banner{background:var(--green-l);border:1px solid var(--green-b);border-radius:var(--r-sm);padding:12px 14px;font-size:13px;color:var(--green);font-weight:500;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px;line-height:1.5;}
.empty-state{text-align:center;padding:40px 20px;color:var(--text3);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-text{font-size:14px;line-height:1.6;}

/* SQUAD */
.m-row{display:flex;align-items:center;gap:12px;}
.m-av{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.m-info{flex:1;min-width:0;}
.m-name{font-weight:700;font-size:15px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.admin-badge{font-size:9px;font-weight:700;background:var(--accent-l);color:var(--accent);padding:2px 7px;border-radius:10px;text-transform:uppercase;}
.m-handle{font-size:11px;color:var(--text3);margin-top:1px;}
.m-loc{font-size:12px;color:var(--text2);margin-top:5px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.ldot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.ev-pill{font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-l);padding:4px 10px;border-radius:20px;white-space:nowrap;}

/* SHEET */
.overlay{position:absolute;inset:0;background:rgba(26,22,18,0.5);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(4px);animation:fadeIn 0.2s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.sheet{background:var(--surface);border-radius:22px 22px 0 0;width:100%;padding:8px 20px 48px;max-height:90vh;overflow-y:auto;scrollbar-width:none;animation:slideUp 0.3s cubic-bezier(0.34,1.1,0.64,1) both;}
.sheet::-webkit-scrollbar{display:none;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.sh-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 20px;}
.sh-av{width:68px;height:68px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:34px;}
.sh-name{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:700;margin-top:12px;letter-spacing:-0.5px;}
.sh-bio{font-size:13px;color:var(--text2);margin-top:5px;line-height:1.5;}
.loc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.loc-box{background:var(--surface2);border-radius:var(--r-sm);padding:12px;}
.loc-lbl{font-size:9px;color:var(--text3);font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.loc-val{font-size:13px;font-weight:600;margin-top:4px;}
.soc-row{display:flex;gap:8px;flex-wrap:wrap;}
.soc-chip{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-xs);padding:7px 12px;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px;font-weight:500;}
.soc-chip b{color:var(--text);}
.sh-ev-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.sh-ev-row:last-child{border-bottom:none;}
.sh-ev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.close-btn{background:var(--surface2);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;color:var(--text2);font-size:18px;display:flex;align-items:center;justify-content:center;}

/* EVENTS */
.filter-strip{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;}
.filter-strip::-webkit-scrollbar{display:none;}
.fchip{background:#FFFFFF;border:2px solid #C8BFB0;border-radius:20px;padding:8px 16px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;color:#1A1612;cursor:pointer;white-space:nowrap;transition:all 0.15s;display:inline-flex;align-items:center;line-height:1.2;user-select:none;-webkit-user-select:none;}
.fchip.act{background:#E8633A;border-color:#E8633A;color:#FFFFFF;box-shadow:0 2px 8px rgba(232,99,58,0.35);}
.ev-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;animation:fadeUp 0.2s ease both;}
.ev-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.ev-name{font-weight:700;font-size:15px;line-height:1.3;flex:1;}
.ev-badge{font-size:9px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;padding:4px 9px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
.ev-badge.fest{background:#EEF5E8;color:#3A7A2E;}
.ev-badge.show{background:var(--accent-l);color:var(--accent);}
.ev-meta{font-size:12px;color:var(--text3);margin-top:6px;display:flex;gap:12px;flex-wrap:wrap;}
.ev-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
.ev-tag{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;background:var(--surface2);color:var(--text3);}
.ev-going{display:flex;align-items:center;gap:6px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.ga-wrap{display:flex;}
.ga{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;border:2px solid var(--surface);margin-right:-5px;}
.going-lbl{font-size:12px;color:var(--text2);margin-left:10px;font-weight:500;}
.rsvp-btn{margin-left:auto;border:none;border-radius:var(--r-xs);padding:6px 12px;font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.15s;white-space:nowrap;flex-shrink:0;}
.rsvp-btn.going{background:var(--green-l);color:var(--green);border:1px solid var(--green-b);}
.rsvp-btn.not-going{background:var(--accent-l);color:var(--accent);border:1px solid var(--accent-l2);}

/* ADD EVENT */
.add-event-form{background:var(--surface);border:1.5px dashed var(--border2);border-radius:var(--r);padding:16px;margin-bottom:14px;}
.add-event-title{font-weight:700;font-size:14px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.form-input{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;font-family:'Outfit',sans-serif;font-size:13px;color:var(--text);outline:none;width:100%;transition:border-color 0.15s;}
.form-input:focus{border-color:var(--accent);}
.form-input::placeholder{color:var(--text3);}
.form-select{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;font-family:'Outfit',sans-serif;font-size:13px;color:var(--text);outline:none;width:100%;cursor:pointer;}
.add-btn{background:var(--accent);border:none;border-radius:var(--r-sm);padding:11px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;color:white;cursor:pointer;width:100%;margin-top:8px;transition:background 0.15s;}
.add-btn:hover{background:var(--accent-d);}

/* PIN */
.pin-hero{background:linear-gradient(140deg,#E8633A 0%,#C03A6A 100%);border-radius:var(--r);padding:22px;margin-bottom:14px;position:relative;overflow:hidden;}
.pin-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,0.08);}
.pin-hero-title{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:900;color:white;position:relative;z-index:1;}
.pin-hero-sub{font-size:13px;color:rgba(255,255,255,0.8);margin-top:6px;line-height:1.55;position:relative;z-index:1;}
.pin-input{background:rgba(255,255,255,0.18);border:1.5px solid rgba(255,255,255,0.3);border-radius:var(--r-sm);padding:11px 14px;color:white;font-family:'Outfit',sans-serif;font-size:13px;width:100%;outline:none;margin-top:14px;position:relative;z-index:1;}
.pin-input::placeholder{color:rgba(255,255,255,0.55);}
.pin-drop-btn{background:white;border:none;border-radius:var(--r-sm);padding:13px;font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;color:var(--accent);cursor:pointer;width:100%;margin-top:12px;position:relative;z-index:1;transition:opacity 0.15s;letter-spacing:0.3px;}
.pin-drop-btn.active{background:rgba(255,255,255,0.25);color:white;border:1.5px solid rgba(255,255,255,0.5);}

<script type="module">
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const TOTEMS = ["🦅","🐺","🦁","🐻","🦊","🐬","🦋","🌵","⚡","🔥","🌊","🌙","🗻","🌿","🎯","🍤","🦐","🎸","🥁","🎪","🦥","🥛"];

// Fuzzy city lookup — handles "chicago", "Chicago IL", "chicago, il" etc.
function getCityCoords(cityStr) {
  if (!cityStr) return null;
  // Exact match first
  if (CITY_COORDS[cityStr]) return CITY_COORDS[cityStr];
  // Normalize and try again
  const norm = cityStr.trim().toLowerCase().replace(/\s+/g,' ');
  for (const key of Object.keys(CITY_COORDS)) {
    if (key.toLowerCase() === norm) return CITY_COORDS[key];
    // Match just the city name part before the comma
    const cityPart = key.split(',')[0].toLowerCase();
    if (cityPart === norm || norm.startsWith(cityPart)) return CITY_COORDS[key];
  }
  return null;
}

// ─── DB HELPERS ───────────────────────────────────────────────────────────────
let db, F;

function waitForDb() {
  return new Promise(resolve => {
    if (window._dbReady) { db = window._db; F = window._firebase; resolve(); }
    else window.addEventListener('dbReady', () => { db = window._db; F = window._firebase; resolve(); }, {once:true});
  });
}

function pathToRef(path) {
  const parts = path.split('/');
  // odd number of parts = collection, even = document
  if (parts.length % 2 === 0) return F.doc(db, ...parts);
  return F.collection(db, ...parts);
}

async function dbSet(path, data) {
  await F.setDoc(F.doc(db, ...path.split('/')), data, {merge: true});
}

async function dbGet(path) {
  const snap = await F.getDoc(F.doc(db, ...path.split('/')));
  return snap.exists() ? {id: snap.id, ...snap.data()} : null;
}

async function dbAdd(col, data) {
  return await F.addDoc(F.collection(db, ...col.split('/')), {...data, createdAt: F.serverTimestamp()});
}

function dbListen(path, cb) {
  return F.onSnapshot(F.doc(db, ...path.split('/')), snap => cb(snap.exists() ? {id: snap.id, ...snap.data()} : null));
}

function dbListenCol(col, cb, orderField) {
  const ref = F.collection(db, ...col.split('/'));
  const q = orderField ? F.query(ref, F.orderBy(orderField, 'asc')) : F.query(ref);
  return F.onSnapshot(q, snap => cb(snap.docs.map(d => ({id: d.id, ...d.data()}))));
}

let authMode = 'login'; // 'login' or 'signup'

function waitForAuth() {

    if (window._auth) { FA = window._firebaseAuth; resolve(); }
    else window.addEventListener('dbReady', () => { FA = window._firebaseAuth; resolve(); }, {once:true});
  });
}

function showAuthScreen() {
  document.getElementById('authScreen').style.display = 'flex';
}

function hideAuthScreen() {
  document.getElementById('authScreen').style.display = 'none';

window.authToggleMode = function() {
  authMode = authMode === 'login' ? 'signup' : 'login';
  const isLogin = authMode === 'login';
  document.getElementById('authTitle').textContent = isLogin ? 'Welcome back' : 'Create account';
  document.getElementById('authSubmitBtn').textContent = isLogin ? 'LOG IN' : 'SIGN UP';
  document.getElementById('authPasswordConfirm').style.display = isLogin ? 'none' : 'block';
  document.getElementById('authSwitch').innerHTML = isLogin
    ? `Don't have an account? <b onclick="window.authToggleMode()">Sign up</b>`
    : `Already have an account? <b onclick="window.authToggleMode()">Log in</b>`;
  document.getElementById('authError').style.display = 'none';
};

function showAuthError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg;
  el.style.display = 'block';
}

window.authSubmit = async function() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const confirm = document.getElementById('authPasswordConfirm').value;
  const btn = document.getElementById('authSubmitBtn');

  if (!email || !password) { showAuthError('Please enter your email and password.'); return; }
  if (authMode === 'signup' && password !== confirm) { showAuthError('Passwords don\'t match.'); return; }
  if (password.length < 6) { showAuthError('Password must be at least 6 characters.'); return; }

  btn.disabled = true;
  btn.textContent = authMode === 'login' ? 'Logging in…' : 'Creating account…';
  document.getElementById('authError').style.display = 'none';

  try {
    if (authMode === 'login') {
      await FA.signInWithEmailAndPassword(window._auth, email, password);
    } else {
      await FA.createUserWithEmailAndPassword(window._auth, email, password);
    }
    // onAuthStateChanged will handle the rest
  } catch(e) {
    btn.disabled = false;
    btn.textContent = authMode === 'login' ? 'LOG IN' : 'SIGN UP';
    const msgs = {
      'auth/user-not-found': 'No account found with that email. Try signing up.',
      'auth/wrong-password': 'Incorrect password. Try again.',
      'auth/email-already-in-use': 'An account with that email already exists. Try logging in.',
      'auth/invalid-email': 'Please enter a valid email address.',
      'auth/weak-password': 'Password should be at least 6 characters.',
      'auth/too-many-requests': 'Too many attempts. Please try again later.',
      'auth/invalid-credential': 'Incorrect email or password. Try again.',
    };
    showAuthError(msgs[e.code] || 'Something went wrong. Please try again.');
  }
};

function getGroupId() { return localStorage.getItem('totem_gid'); }
function setGroupId(id) { localStorage.setItem('totem_gid', id); }

// ─── BOOT ─────────────────────────────────────────────────────────────────────
async function boot() {
  await waitForDb();
  await waitForAuth();

  hideSplash();

  // Listen for auth state — this persists across page reloads automatically
  FA.onAuthStateChanged(window._auth, async (user) => {
    if (user) {
      // User is logged in
      hideAuthScreen();
      S.userId = user.uid;

      // Check URL for invite
      const urlParams = new URLSearchParams(window.location.search);
      const inviteGroup = urlParams.get('join');
      if (inviteGroup && inviteGroup !== S.groupId) {
        S.groupId = inviteGroup;
        setGroupId(inviteGroup);
      }

      S.groupId = S.groupId || getGroupId();

      document.getElementById('loading').style.display = 'flex';

      if (S.groupId) {
        try {
          const profile = await dbGet(`groups/${S.groupId}/members/${S.userId}`);
          if (profile && profile.name) {
            S.myProfile = profile;
            document.getElementById('loading').style.display = 'none';
            await loadApp();
          } else {
            document.getElementById('loading').style.display = 'none';
            showOnboarding('profile');
          }
        } catch(e) {
          console.error('Boot error:', e);
          document.getElementById('loading').style.display = 'none';
          showOnboarding('profile');
        }
      } else {
        document.getElementById('loading').style.display = 'none';
        showOnboarding('welcome');
      }
    } else {
      // Not logged in — show auth screen
      document.getElementById('loading').style.display = 'none';
      showAuthScreen();
    }
  });
}

window._ob = async function(next) {
  const s = obState;
  if (next === 'create') { s.step = 'create'; renderOb(); return; }
  if (next === 'createTotem') {
    const v = document.getElementById('obGroupName')?.value.trim();
    if (!v) { alert('Please enter a group name'); return; }
    s.groupName = v; s.step = 'createTotem'; renderOb(); return;
  }
  if (next === 'createInterests') { s.step = 'createInterests'; renderOb(); return; }
  if (next === 'profile') { s.step = 'profile'; renderOb(); return; }
  if (next === 'join') { s.step = 'join'; renderOb(); return; }
  if (next === 'joinSubmit') {
    const code = document.getElementById('obJoinCode')?.value.trim();
    if (!code) { alert('Please enter an invite code'); return; }
    const gData = await dbGet(`groups/${code}`);
    if (!gData) { alert('Group not found. Check the code and try again.'); return; }
    S.groupId = code; setGroupId(code);
    s.step = 'profile'; renderOb(); return;
  }
  if (next === 'finish') {
    const name = document.getElementById('obName')?.value.trim();
    const city = document.getElementById('obCity')?.value;
    if (!name) { alert('Please enter your name'); return; }
    if (!city) { alert('Please select your city'); return; }
    s.name = name;
    s.handle = document.getElementById('obHandle')?.value.trim() || '@' + name.toLowerCase().replace(/\s/g,'');
    s.bio = document.getElementById('obBio')?.value.trim() || '';
    s.city = city;

    // If creating new group, create it first
    if (!S.groupId) {
      const gid = Math.random().toString(36).slice(2,8);
      S.groupId = gid; setGroupId(gid);
      await dbSet(`groups/${gid}`, {
        name: s.groupName, totem: s.groupTotem,
        interests: s.interests, adminId: S.userId,
        createdAt: Date.now(), inviteCode: gid,
      });
      S.interests = s.interests;
    } else {
      const gData = await dbGet(`groups/${S.groupId}`);
      if (gData?.interests) S.interests = gData.interests;
    }

    // Save profile
    const color = MEMBER_COLORS[Math.floor(Math.random()*MEMBER_COLORS.length)];
    const profile = {
      id: S.userId, name: s.name, handle: s.handle.startsWith('@') ? s.handle : '@'+s.handle,
      bio: s.bio, avatar: s.avatar, color, city: s.city, nextCity: '',
      socials: {ig:'',sc:''}, isAdmin: !S.groupId || S.userId === S.userId,
      joinedAt: Date.now(), createdAt: Date.now(),
    };
    await dbSet(`groups/${S.groupId}/members/${S.userId}`, profile);
    S.myProfile = profile;
    document.getElementById('ob').style.display = 'none';
    await loadApp();
  }
};

window._obTotem = function(t) {

window._obAvatar = function(t) {

window._obInt = function(id, btn) {
  const s = obState;
  if (s.interests.includes(id)) {
    if(s.interests.length<=1)return;
    s.interests = s.interests.filter(i=>i!==id);
    btn.classList.remove('on'); btn.querySelector('.int-check').textContent='';
  } else {
    s.interests.push(id);
    btn.classList.add('on'); btn.querySelector('.int-check').textContent='✓';
  }
};

async function loadApp() {
  document.getElementById('loading').style.display='flex';

  // Load group data
  const gData = await dbGet(`groups/${S.groupId}`);
  if (!gData) { alert('Group not found'); return; }
  S.groupData = gData;
  S.interests = gData.interests || S.interests;

  document.getElementById('hdrTotem').textContent = gData.totem || '🦅';
  document.getElementById('hdrName').textContent = gData.name || 'My Crew';

  // Reveal admin backdoor only for master account
  const MASTER_UID = 'ZfI2rVLFHJPnk0TTBF7OGfTvxsh2';
  if (S.userId === MASTER_UID) {
    const adminBtn = document.getElementById('adminNavBtn');
    if (adminBtn) adminBtn.style.display = 'block';
  }

  document.getElementById('loading').style.display='none';
  document.getElementById('mainApp').style.display='flex';

  // Live listeners
  S.unsubs.push(dbListenCol(`groups/${S.groupId}/members`, members => {
    S.members = members;
    buildSquad();
    buildMap();
    if (document.getElementById('tab-map').style.display !== 'none') buildMap();
  })); // no orderBy — members don't have server timestamps

  S.unsubs.push(dbListenCol(`groups/${S.groupId}/events`, events => {
    S.events = events;
    if (document.getElementById('tab-events').style.display !== 'none') buildEvents();
    buildChat(); // refresh chat tabs when events change
  })); // sorted client-side by dateTs

  S.unsubs.push(dbListenCol(`groups/${S.groupId}/pins`, pins => {
    S.pins = pins.filter(p => p.active);
    if (document.getElementById('tab-pin').style.display !== 'none') buildPin();
  }));

  S.unsubs.push(dbListen(`groups/${S.groupId}`, gd => {
    if (gd) {
      S.groupData = gd;
      S.interests = gd.interests || S.interests;
      document.getElementById('hdrTotem').textContent = gd.totem || '🦅';
      document.getElementById('hdrName').textContent = gd.name || 'My Crew';
      // Rebuild settings if it's visible
      if (document.getElementById('tab-settings').style.display !== 'none') buildSettings();
    }
  }));

  buildSquad();
  buildEvents();
  buildPin();
  buildMap();
  buildChat();
  buildProfile();
  buildSettings();
}

function formatDateDisplay(dateStr) {
  if (!dateStr) return 'TBD';
  if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
    const d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
  }
  return dateStr;
}

function sortEvents(events) {
  return [...events].sort((a, b) => {
    const da = a.dateTs || 0, db2 = b.dateTs || 0;
    if (!da && !db2) return 0;
    if (!da) return 1;
    if (!db2) return -1;
    return da - db2;
  });
}

async function addEvent() {
  const name = document.getElementById('evName')?.value.trim();
  if (!name) { alert('Please enter an event name'); return; }
  const city = document.getElementById('evCity')?.value;
  if (!city) { alert('Please select a city'); return; }
  const startDate = document.getElementById('evDateStart')?.value;
  const endDate = document.getElementById('evDateEnd')?.value;
  let dateDisplay = '', dateTs = 0;
  if (startDate) {
    dateTs = new Date(startDate + 'T12:00:00').getTime();
    dateDisplay = endDate && endDate !== startDate
      ? `${formatDateDisplay(startDate)} – ${formatDateDisplay(endDate)}`
      : startDate;
  }
  const ev = {
    name, date: dateDisplay || startDate || '',
    dateTs, city,
    venue: document.getElementById('evVenue')?.value.trim()||'',
    type: document.getElementById('evType')?.value||'show',
    interests: S.interests.slice(0,2),
    going: [S.userId], addedBy: S.userId,
  };
  await dbAdd(`groups/${S.groupId}/events`, ev);
  ['evName','evDateStart','evDateEnd','evVenue'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  const cityEl = document.getElementById('evCity'); if(cityEl) cityEl.value='';
}
window.addEvent = addEvent;

async function toggleRsvp(evId, currently) {
  const ref = F.doc(db, `groups/${S.groupId}/events`, evId);
  if (currently) {
    await F.updateDoc(ref, {going: F.arrayRemove(S.userId)});
  } else {
    await F.updateDoc(ref, {going: F.arrayUnion(S.userId)});
  }
}

function getCityLatLng(cityStr) {
  if (!cityStr) return null;
  if (CITY_LATLNG[cityStr]) return CITY_LATLNG[cityStr];
  const norm = cityStr.trim().toLowerCase();
  for (const key of Object.keys(CITY_LATLNG)) {
    if (key.toLowerCase() === norm) return CITY_LATLNG[key];
    if (key.split(',')[0].toLowerCase() === norm.split(',')[0].trim()) return CITY_LATLNG[key];
  }
  return null;
}

let leafletMap = null;

function initLeafletMap(cityGroups) {
  // Load Leaflet if not already loaded
  if (!window.L) {
    const css = document.createElement('link');
    css.rel = 'stylesheet';
    css.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
    document.head.appendChild(css);
    const script = document.createElement('script');
    script.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
    script.onload = () => renderLeaflet(cityGroups);
    document.head.appendChild(script);
  } else {
    renderLeaflet(cityGroups);
  }
}

function renderLeaflet(cityGroups) {
  const mapEl = document.getElementById('leafletMap');
  if (!mapEl) return;

  // Destroy old map instance if exists
  if (leafletMap) { try { leafletMap.remove(); } catch(e){} leafletMap = null; }

  // Calculate center from members
  const allLatLngs = Object.entries(cityGroups).map(([city]) => getCityLatLng(city)).filter(Boolean);
  const centerLat = allLatLngs.length ? allLatLngs.reduce((s,ll)=>s+ll[0],0)/allLatLngs.length : 39.5;
  const centerLng = allLatLngs.length ? allLatLngs.reduce((s,ll)=>s+ll[1],0)/allLatLngs.length : -98.35;
  const zoom = allLatLngs.length === 1 ? 8 : 4;

  leafletMap = L.map('leafletMap', {zoomControl:false, attributionControl:false}).setView([centerLat, centerLng], zoom);

  // Warm, muted map tiles
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    maxZoom:19, subdomains:'abcd'
  }).addTo(leafletMap);

  // Add a pin for each city group
  Object.entries(cityGroups).forEach(([city, {members}]) => {
    const ll = getCityLatLng(city);
    if (!ll) return;
    const names = members.map(m=>m.name.split(' ')[0]).join(', ');
    const avatars = members.slice(0,3).map(m=>m.avatar||'🌻').join('');
    const color = members[0].color || '#E8633A';

    const icon = L.divIcon({
      className: '',
      html: `<div style="
        background:${color};
        border:3px solid white;
        border-radius:50%;
        width:${members.length>1?44:36}px;
        height:${members.length>1?44:36}px;
        display:flex;align-items:center;justify-content:center;
        font-size:${members.length>1?14:18}px;
        box-shadow:0 2px 8px rgba(0,0,0,0.25);
        cursor:pointer;
      ">${avatars}</div>`,
      iconSize: [members.length>1?44:36, members.length>1?44:36],
      iconAnchor: [members.length>1?22:18, members.length>1?22:18],
    });

    const marker = L.marker(ll, {icon}).addTo(leafletMap);
    marker.bindTooltip(`<b>${city.split(',')[0]}</b><br>${names}`, {
      permanent:false, direction:'top', className:'totem-tooltip'
    });
  });
}

function buildChat() {

  const chatTabs = [

      ${chatTabs.map(t=>`<button class="chat-tab${S.activeChatTab===t.id?' act':''}" onclick="window.switchChatTab('${t.id}')">${t.label}</button>`).join('')}
    </div>
    <div class="chat-msgs" id="chatMsgs" style="flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:12px;min-height:0;"></div>
    <div style="flex-shrink:0;background:#fff;border-top:1px solid #E0D8CC;padding:12px 14px;padding-bottom:max(24px,env(safe-area-inset-bottom,24px));">
      <div style="display:flex;gap:8px;align-items:center;">
        <input class="chat-input" id="chatInput" placeholder="Message the crew…" onkeydown="if(event.key==='Enter')window.sendMsg()" style="flex:1;background:#EEE8DE;border:1.5px solid #E0D8CC;border-radius:22px;padding:12px 16px;font-family:'Outfit',sans-serif;font-size:16px;color:#1A1612;outline:none;">
        <button onclick="window.sendMsg()" style="background:#E8633A;border:none;border-radius:50%;width:44px;height:44px;cursor:pointer;color:white;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 10px rgba(232,99,58,0.3);">↑</button>
      </div>
    </div>`;

  subscribeToChat(S.activeChatTab);
}

function subscribeToChat(chatId) {
  // Unsub all previous listeners
  Object.values(chatUnsubs).forEach(unsub => { try { unsub(); } catch(e){} });
  chatUnsubs = {};

  const colPath = chatId === 'general'
    ? `groups/${S.groupId}/messages`
    : `groups/${S.groupId}/eventChats/${chatId}/messages`;

  const parts = colPath.split('/');
  const col = F.collection(db, ...parts);
  // No orderBy — avoids needing a Firestore index. Sort client-side.
  chatUnsubs[chatId] = F.onSnapshot(col, snap => {
    const msgs = snap.docs
      .map(d => ({id: d.id, ...d.data()}))
      .sort((a, b) => {
        const ta = a.createdAt?.toMillis ? a.createdAt.toMillis() : (a.createdAt || 0);
        const tb = b.createdAt?.toMillis ? b.createdAt.toMillis() : (b.createdAt || 0);
        return ta - tb;
      });
    renderMessages(msgs);
  });
}

function renderMessages(msgs) {
  const container = document.getElementById('chatMsgs');
  if (!container) return;
  if (!msgs.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">💬</div><div class="empty-text">No messages yet.<br>Say something to your crew!</div></div>`;
    return;
  }
  container.innerHTML = msgs.map(msg => {
    const m = S.members.find(mb=>mb.id===msg.userId) || {avatar:'🌻',name:'Someone',color:'#E8633A',id:''};
    const isMe = msg.userId === S.userId;
    const time = msg.createdAt?.toDate ? msg.createdAt.toDate().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : msg.time||'';
    return `<div class="msg${isMe?' me':''}">
      <div class="msg-av" style="background:${m.color}20">${m.avatar}</div>
      <div class="msg-body">
        ${!isMe?`<div class="msg-sender" style="color:${m.color}">${m.name}</div>`:''}
        <div class="bubble">${msg.text}</div>
        <div class="msg-time">${time}</div>
      </div>
    </div>`;
  }).join('');
  scrollChatToBottom();
}

  const colPath = S.activeChatTab==='general'

window.removeMember = async function(memberId, memberName) {
  if (!confirm(`Remove ${memberName} from the group? They will need the invite link to rejoin.`)) return;

    console.error('Remove member error:', e);
    alert('Something went wrong. Try again.');

const MASTER_UID = 'ZfI2rVLFHJPnk0TTBF7OGfTvxsh2';

async function buildAdminPanel() {
  if (S.userId !== MASTER_UID) return;
  const el = document.getElementById('tab-admin');
  el.innerHTML = '<div style="padding:20px;font-size:14px;color:#A09488;">Loading all groups…</div>';

  try {
    // Load all groups
    const groupsSnap = await F.getDocs(F.collection(db, 'groups'));
    const groups = groupsSnap.docs.map(d => ({id: d.id, ...d.data()}));

    // For each group load member count
    const groupDetails = await Promise.all(groups.map(async g => {
      const membersSnap = await F.getDocs(F.collection(db, 'groups', g.id, 'members'));
      const eventsSnap = await F.getDocs(F.collection(db, 'groups', g.id, 'events'));
      return {
        ...g,
        memberCount: membersSnap.size,
        members: membersSnap.docs.map(d => d.data()),
        eventCount: eventsSnap.docs.filter(d => !d.data().deleted).length,
      };
    }));

    const html = [];
    html.push('<div style="padding:18px 18px 0;display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px;">');
    html.push('<div style="font-family:Unbounded,sans-serif;font-size:17px;font-weight:700;color:#7A5EA7;">⚡ Admin</div>');
    html.push('<div style="font-size:12px;color:#A09488;">' + groupDetails.length + ' groups</div>');
    html.push('</div>');

    html.push('<div style="padding:0 18px;">');
    html.push('<div style="background:#F3EEF8;border:1.5px solid #C4A8E8;border-radius:10px;padding:10px 14px;font-size:12px;color:#7A5EA7;margin-bottom:16px;line-height:1.5;">🔒 Backdoor — only visible to you</div>');

    // Stats bar
    const totalMembers = groupDetails.reduce((a, g) => a + g.memberCount, 0);
    const totalEvents = groupDetails.reduce((a, g) => a + g.eventCount, 0);
    html.push('<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;">');
    html.push('<div style="background:#fff;border:2px solid #E0D8CC;border-radius:12px;padding:12px;text-align:center;"><div style="font-size:22px;font-weight:700;color:#1A1612;">' + groupDetails.length + '</div><div style="font-size:10px;color:#A09488;font-weight:700;letter-spacing:0.5px;margin-top:2px;">GROUPS</div></div>');
    html.push('<div style="background:#fff;border:2px solid #E0D8CC;border-radius:12px;padding:12px;text-align:center;"><div style="font-size:22px;font-weight:700;color:#1A1612;">' + totalMembers + '</div><div style="font-size:10px;color:#A09488;font-weight:700;letter-spacing:0.5px;margin-top:2px;">MEMBERS</div></div>');
    html.push('<div style="background:#fff;border:2px solid #E0D8CC;border-radius:12px;padding:12px;text-align:center;"><div style="font-size:22px;font-weight:700;color:#1A1612;">' + totalEvents + '</div><div style="font-size:10px;color:#A09488;font-weight:700;letter-spacing:0.5px;margin-top:2px;">EVENTS</div></div>');
    html.push('</div>');

    // Group cards
    groupDetails.sort((a, b) => (b.memberCount - a.memberCount)).forEach(g => {
      html.push('<div style="background:#fff;border:2px solid #E0D8CC;border-radius:16px;padding:16px;margin-bottom:12px;">');

      // Header
      html.push('<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">');
      html.push('<div style="font-size:28px;">' + (g.totem || '🦅') + '</div>');
      html.push('<div style="flex:1;"><div style="font-size:15px;font-weight:700;color:#1A1612;">' + (g.name || 'Unnamed') + '</div><div style="font-size:11px;color:#A09488;margin-top:2px;">ID: ' + g.id + '</div></div>');
      html.push('<div style="text-align:right;"><div style="font-size:13px;font-weight:700;color:#E8633A;">' + g.memberCount + ' members</div><div style="font-size:11px;color:#A09488;">' + g.eventCount + ' events</div></div>');
      html.push('</div>');

      // Interests
      if (g.interests && g.interests.length) {
        html.push('<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;">');
        g.interests.forEach(i => {
          const int = ALL_INTERESTS.find(a => a.id === i);
          if (int) html.push('<span style="background:#F6F1E9;border:1px solid #E0D8CC;border-radius:20px;padding:3px 9px;font-size:10px;font-weight:600;color:#6B6258;">' + int.emoji + ' ' + int.label + '</span>');
        });
        html.push('</div>');
      }

      // Members list
      if (g.members && g.members.length) {
        html.push('<div style="border-top:1px solid #E8E2D9;padding-top:10px;">');
        html.push('<div style="font-size:10px;font-weight:700;letter-spacing:1px;color:#A09488;margin-bottom:8px;">MEMBERS</div>');
        g.members.forEach(m => {
          html.push('<div style="display:flex;align-items:center;gap:8px;padding:5px 0;">');
          html.push('<div style="font-size:18px;">' + (m.avatar || '🌻') + '</div>');
          html.push('<div style="flex:1;"><div style="font-size:13px;font-weight:600;color:#1A1612;">' + (m.name || 'Unknown') + '</div><div style="font-size:11px;color:#A09488;">' + (m.city || 'No city') + '</div></div>');

          html.push('</div>');
        });
        html.push('</div>');
      }

      html.push('</div>');
    });

    html.push('<div style="height:60px;"></div>');
    html.push('</div>');

    el.innerHTML = html.join('');

  } catch(e) {
    console.error('Admin panel error:', e);
    el.innerHTML = '<div style="padding:20px;font-size:14px;color:#E53E3E;">Error loading admin data: ' + e.message + '</div>';
  }
}

  // DANGER ZONE
  html.push('<div style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#A09488;margin-bottom:10px;">DANGER ZONE</div>');
  html.push('<button onclick="window.signOutUser()" style="background:#FFFFFF;border:2px solid #E53E3E;border-radius:12px;padding:16px;font-family:Outfit,sans-serif;font-size:15px;font-weight:600;color:#E53E3E;cursor:pointer;width:100%;margin-bottom:10px;">Sign Out</button>');
  html.push('<button onclick="window.leaveGroup()" style="background:#FFFFFF;border:2px solid #E53E3E;border-radius:12px;padding:16px;font-family:Outfit,sans-serif;font-size:15px;font-weight:600;color:#E53E3E;cursor:pointer;width:100%;">Leave Group</button>');
  html.push('<div style="height:60px;"></div>');

  document.getElementById('tab-settings').innerHTML = html.join('');

  // Populate invite link box safely
  const box = document.getElementById('inviteLinkBox');
  if (box && inviteUrl) {
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'background:#F6F1E9;border:2px dashed #C8BFB0;border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;';
    const urlSpan = document.createElement('span');
    urlSpan.style.cssText = 'font-size:11px;color:#6B6258;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;';
    urlSpan.textContent = inviteUrl;
    const copyBtn = document.createElement('button');
    copyBtn.textContent = 'Copy';
    copyBtn.style.cssText = 'background:#E8633A;border:none;border-radius:8px;padding:8px 16px;font-family:Outfit,sans-serif;font-size:12px;font-weight:700;color:white;cursor:pointer;white-space:nowrap;flex-shrink:0;';
    copyBtn.onclick = function() {
      navigator.clipboard.writeText(inviteUrl).then(() => {
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = 'Copy', 2000);
      });
    };
    wrapper.appendChild(urlSpan);
    wrapper.appendChild(copyBtn);
    box.appendChild(wrapper);
  }

  buildSettingsInts();
}

function buildSettingsInts() {
  const g = document.getElementById('settingsIntGrid');
  if(!g)return;
  g.innerHTML = ALL_INTERESTS.map(i=>{
    const on=S.interests.includes(i.id);
    return `<button class="int-btn${on?' on':''}" onclick="window._togSettingsInt('${i.id}',this)">
      <span class="int-emoji">${i.emoji}</span><span style="flex:1">${i.label}</span>
      <span class="int-check">${on?'✓':''}</span>
    </button>`;
  }).join('');
}

window._togSettingsInt = async function(id, btn) {
  if(S.interests.includes(id)){
    if(S.interests.length<=1)return;
    S.interests=S.interests.filter(i=>i!==id);
    btn.classList.remove('on');btn.querySelector('.int-check').textContent='';
  } else {
    S.interests.push(id);
    btn.classList.add('on');btn.querySelector('.int-check').textContent='✓';
  }
  await dbSet(`groups/${S.groupId}`, {interests: S.interests});
  buildEvents();
};

window._togNotif = function(k) {
  S.notifs[k]=!S.notifs[k];
  const b=document.getElementById('tog-'+k);
  if(b)b.classList.toggle('on',S.notifs[k]);
};

window.editGroupName = function() {
  const current = S.groupData?.name || '';
  const name = prompt('Group name:', current);
  if (!name || !name.trim() || name.trim() === current) return;
  dbSet(`groups/${S.groupId}`, {name: name.trim()}).then(() => {
    S.groupData = {...S.groupData, name: name.trim()};
    document.getElementById('hdrName').textContent = name.trim();
    buildSettings();
  });
};

window.editGroupTotem = function() {
  const existing = document.getElementById('editGroupTotemModal');
  if (existing) existing.remove();
  const modal = document.createElement('div');
  modal.id = 'editGroupTotemModal';
  modal.className = 'overlay';
  modal.onclick = e => { if (e.target === modal) modal.remove(); };
  modal.innerHTML = `
    <div class="sheet" onclick="event.stopPropagation()">
      <div class="sh-handle"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <div style="font-family:Unbounded,sans-serif;font-size:18px;font-weight:700;">Group Totem</div>
        <button class="close-btn" onclick="document.getElementById('editGroupTotemModal').remove()">×</button>
      </div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:16px;">Pick a symbol for your crew — shows on the map and in the group badge.</div>
      <div class="totem-grid" id="groupTotemGrid">
        ${TOTEMS.map(t => `<button class="totem-opt${t===S.groupData?.totem?' sel':''}" onclick="window.selectGroupTotem('${t}')">${t}</button>`).join('')}
      </div>
      <div style="text-align:center;font-size:48px;margin:16px 0;" id="groupTotemPreview">${S.groupData?.totem||'🦅'}</div>
      <button class="save-btn" onclick="window.saveGroupTotem()">SAVE TOTEM</button>
    </div>`;
  document.getElementById('app').appendChild(modal);
};

window._pendingGroupTotem = null;
window.selectGroupTotem = function(t) {
  window._pendingGroupTotem = t;
  document.querySelectorAll('#groupTotemGrid .totem-opt').forEach(b => b.classList.toggle('sel', b.textContent === t));
  const prev = document.getElementById('groupTotemPreview');
  if (prev) { prev.textContent = t; prev.style.animation='none'; requestAnimationFrame(()=>prev.style.animation='totemPop 0.3s cubic-bezier(0.34,1.56,0.64,1) both'); }
};

window.saveGroupTotem = async function() {
  const t = window._pendingGroupTotem || S.groupData?.totem;
  if (!t) return;
  await dbSet(`groups/${S.groupId}`, {totem: t});
  S.groupData = {...S.groupData, totem: t};
  document.getElementById('hdrTotem').textContent = t;
  document.getElementById('editGroupTotemModal')?.remove();
  buildSettings();
};

window.leaveGroup = function() {
  if(confirm('Leave this group? You can rejoin with the invite link.')) {
    localStorage.removeItem('totem_gid');
    location.reload();
  }
};

window.signOutUser = async function() {
  if (!confirm('Sign out of Totem?')) return;
  await FA.signOut(window._auth);
  localStorage.removeItem('totem_gid');
  location.reload();
};
